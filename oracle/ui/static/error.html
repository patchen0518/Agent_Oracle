<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { max-width: 500px; padding: 2rem; background: #1e2130; border-radius: 12px; border: 1px solid #ef4444; }

<body>
  <div class="box">
    <h1>⚠ Ollama is not running</h1>
    <p>Oracle needs Ollama to work. Here's how to fix it:</p>
    <ol>
      <li>Install Ollama from <a href="https://ollama.com/download" target="_blank">ollama.com/download</a></li>
      <li>Start Ollama: <code>ollama serve</code></li>
      <li>Pull a model: <code>ollama pull gemma4:12b</code></li>
      <li>Run Oracle again: <code>oracle</code></li>
    </ol>
  </div>
